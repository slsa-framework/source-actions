---
name: SLSA Source Provenance Creator

description: Creates SLSA Source Track Provenance

inputs:
  allow-merge-commits:
    description: 'Experimental support for merge commits '
    required: false
    default: false

  build-from-source:
    description: 'Build sourcetool from source'
    required: false
    default: false

  version:
    description: "sourcetool version to use"
    required: true

runs:
  using: "Composite"
  steps:
    # This PoC depends on creating and checking information when branches are updated (e.g. via push).
    # Don't allow runs that do not occur during pushes.
    - id: check_push
      if: ${{ github.event_name != 'push' }}
      run: |
        echo "This action can only be run during a push."
        exit 1
      shell: bash

    # This needs to persis its credentials to store the attestations
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      id: checkout_sourcetool_code
      if: inputs.build-from-source == 'true'
      with:
        repository: slsa-framework/source-tool
        path: ${{ github.workspace }}/.bin/build
        # This checkout is only used to build the binary; it must not
        # persist credentials into the workspace.
        persist-credentials: false

    - id: go_versions
      if: inputs.build-from-source == 'true'
      uses: carabiner-dev/actions/go/versions@2a4b2cd115ede14629b03ef7e77586d3269d4c72 # v1.2.3
      with:
        go-mod-path: ${{ github.workspace }}/.bin/build/go.mod

    - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      if: inputs.build-from-source == 'true'
      with:
        go-version: ${{ steps.go_versions.outputs.GO_VERSION_STABLE }}

    # This is building sourcetool from source. This step will be replaced
    # to run the built binary once things are stable.
    - id: build_binary
      run: |
        cd ${{ github.workspace }}/.bin/build/
        go build -o sourcetool .
        mv sourcetool ${{ github.workspace }}/.bin/
        cd ${{ github.workspace }}
        ${{ github.workspace }}/.bin/sourcetool --help
      name: Build sourcetool
      if: inputs.build-from-source == 'true'
      shell: bash

    # Todo: Support other platforms
    - id: download_binary
      if: inputs.build-from-source == 'false'
      shell: bash
      run: |
        if [ -z "${VERSION}" ]; then
          echo "sourcetool version not set"
          exit 1
        fi
        mkdir -p "${WORKSPACE}/.bin/"
        curl -fLo "${WORKSPACE}/.bin/sourcetool" "https://github.com/slsa-framework/source-tool/releases/download/${VERSION}/sourcetool-${VERSION}-linux-amd64"
        curl -fLo "${WORKSPACE}/.bin/sourcetool.intoto.jsonl" "https://github.com/slsa-framework/source-tool/releases/download/${VERSION}/sourcetool.intoto.jsonl"

        # TODO verify binary
        chmod 0755 "${WORKSPACE}/.bin/sourcetool"
      env:
        WORKSPACE: ${{ github.workspace }}
        VERSION: ${{ inputs.version }}

    - id: verify_binary
      if: inputs.build-from-source == 'false'
      uses: carabiner-dev/actions/ampel/verify@2a4b2cd115ede14629b03ef7e77586d3269d4c72 # v1.2.3
      env:
        # This is the SLSA builder ID we will verify before running the sourcetool binary
        AMPEL_BUILDERID: "https://github.com/slsa-framework/source-tool/.github/workflows/release.yaml"
      with:
        subject: ${{ github.workspace }}/.bin/sourcetool
        collector: "jsonl:${{ github.workspace }}/.bin/sourcetool.intoto.jsonl"
        policy: "git+https://github.com/carabiner-dev/policies#slsa/builderid-base.json"
        signer: "sigstore(regexp)::https://token.actions.githubusercontent.com::https://github.com/slsa-framework/source-tool/.github/workflows/release.yaml@.*"
    
    # Attestations are pushed to the repository's git notes when sourcetool
    # supports it: v0.7.0 and above or any build from source.
    - id: configure_push
      name: Configure attestation push
      shell: bash
      run: |
        PUSH_FLAG=""
        MIN_PUSH_VERSION="v0.7.0"
        if [ "${BUILD_FROM_SOURCE}" = "true" ]; then
          PUSH_FLAG="--push=note"
        elif [ "$(printf '%s\n%s\n' "$MIN_PUSH_VERSION" "${VERSION}" | sort -V | head -n1)" = "$MIN_PUSH_VERSION" ]; then
          PUSH_FLAG="--push=note"
        fi
        echo "push_flag=${PUSH_FLAG}" >> "$GITHUB_OUTPUT"
      env:
        BUILD_FROM_SOURCE: ${{ inputs.build-from-source }}
        VERSION: ${{ inputs.version }}

    - id: handle_branch_push
      name: Generate attestations
      if: ${{ startsWith(github.ref, 'refs/heads/') }}
      # All context values are passed through the environment and quoted in
      # the script to avoid shell injection. Git ref names (REF_NAME) in
      # particular are attacker-controllable and may contain shell
      # metacharacters. PUSH_FLAG is a fixed value computed above so it is
      # intentionally left unquoted to expand to a flag or to nothing.
      run: |
        echo "## SLSA Source Properties Branch Push" >> "$GITHUB_STEP_SUMMARY"
        mkdir metadata
        "${WORKSPACE}/.bin/sourcetool" checklevelprov \
          --commit "${COMMIT_SHA}" --owner "${REPO_OWNER}" \
          --repo "${REPO_NAME}" --branch "${REF_NAME}" \
          --allow-merge-commits="${ALLOW_MERGE_COMMITS}" \
          ${PUSH_FLAG} \
          --output_signed_bundle "${WORKSPACE}/metadata/signed_bundle.intoto.jsonl" >> "$GITHUB_STEP_SUMMARY"
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        WORKSPACE: ${{ github.workspace }}
        COMMIT_SHA: ${{ github.sha }}
        REPO_OWNER: ${{ github.repository_owner }}
        REPO_NAME: ${{ github.event.repository.name }}
        REF_NAME: ${{ github.ref_name }}
        ALLOW_MERGE_COMMITS: ${{ inputs.allow-merge-commits }}
        PUSH_FLAG: ${{ steps.configure_push.outputs.push_flag }}

    - id: handle_tag_push
      if: ${{ startsWith(github.ref, 'refs/tags/') }}
      # See the note on handle_branch_push above regarding shell injection.
      run: |
        echo "## SLSA Source Properties Tag Push" >> "$GITHUB_STEP_SUMMARY"
        mkdir metadata
        "${WORKSPACE}/.bin/sourcetool" --github_token "${GITHUB_TOKEN}" checktag \
          --commit "${COMMIT_SHA}" --owner "${REPO_OWNER}" \
          --repo "${REPO_NAME}" --tag_name "${REF_NAME}" \
          --actor "${TRIGGERING_ACTOR}" \
          ${PUSH_FLAG} \
          --output_signed_bundle "${WORKSPACE}/metadata/signed_bundle.intoto.jsonl" >> "$GITHUB_STEP_SUMMARY"
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        WORKSPACE: ${{ github.workspace }}
        COMMIT_SHA: ${{ github.sha }}
        REPO_OWNER: ${{ github.repository_owner }}
        REPO_NAME: ${{ github.event.repository.name }}
        REF_NAME: ${{ github.ref_name }}
        TRIGGERING_ACTOR: ${{ github.triggering_actor }}
        PUSH_FLAG: ${{ steps.configure_push.outputs.push_flag }}
  
    - id: summary
      run: |
        echo "## Signed Bundle" >> $GITHUB_STEP_SUMMARY
        cat ${{ github.workspace }}/metadata/signed_bundle.intoto.jsonl >> $GITHUB_STEP_SUMMARY
      shell: bash

    # Legacy note storage: only runs when sourcetool did NOT push the note
    # itself (i.e. when the --push=note flag was not passed). Newer sourcetool
    # versions store the git note natively, so running this too would append a
    # duplicate attestation to refs/notes.
    - run: |
          git config user.name "${ACTOR}"
          git config user.email "${ACTOR}@users.noreply.github.com"
          git fetch origin "refs/notes/*:refs/notes/*"
          git notes append -F ./metadata/signed_bundle.intoto.jsonl
          git push origin "refs/notes/*"
      shell: bash
      name: store git note
      if: steps.configure_push.outputs.push_flag == ''
      env:
        ACTOR: ${{ github.actor }}

    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      if: success() && (steps.handle_branch_push.outcome == 'success' || steps.handle_tag_push.outcome == 'success')
      with:
        name: prov_metadata
        path: ./metadata/
